name: 10 inputs parameters choice list

on: 
    workflow_dispatch:
        inputs:
            environment:
                description: Choose the environment to deploy
                required: true 
                default: DEV
                type: choice
                options:
                    - DEV
                    - TEST
                    - PROD
            artifact_tag:
                description: Choose the git tag to deploy
                required: true 

jobs:
    inputs-demo:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy the App
              run: echo "Deploying the application to ${{inputs.environment}}"
              