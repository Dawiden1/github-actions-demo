name: 13 if condition
on: 
    workflow_dispatch:
   
# two below are used to job3 and job4
    pull_request:
        types:
            - opened
            - synchronize
    push:
        branches:
            - main


jobs:
    job1-basics:
        runs-on: ubuntu-latest
        steps:
            - name: Run if branch is main (curly brackets)
              if: ${{ github.ref == 'refs/heads/main' }} 
              run: echo "Running this step"

            - name: Run if branch is main (no curly brackets)
              if: github.ref == 'refs/heads/main' 
              run: echo "Running this step"

            - name: Run if branch is main (no curly brackets)
              if: github.ref_name == 'main' 
              run: echo "Running this step"

            - name: Run this step 
              run: echo "Running this step"

    jo2_with_or_condition:
        runs-on: ubuntu-latest
        steps:
            - name: Run for Dawiden1
              if: github.actor == 'Dawiden1' || github.actor == 'Ned1vad47'
              run: |
                echo "It is triggered by either Dawiden1 or Ned1vad47"
                echo "Github actor is ${{ github.actor }}"

# More examples of using if conditions on JOB LEVEL
#    - Run "Build Job" when pull request is raised
#    - Run "Deploy Job" when commits are pushed to main

    build-job: 
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'}}
        runs-on: ubuntu-latest
        steps:
            - name: Building
              run: echo "Build Job"

    deploy-job: 
        if:  ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        runs-on: ubuntu-latest
        steps:
            - name: Deploying
              run: echo "Deploy Job"

# build-job is run in PR
# deploy-job is run in github actions tab
# job1 and job2 are run in both situations 