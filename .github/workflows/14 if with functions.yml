name: 14 if with functions
on:  
    push:
        branches:
            - main 
            - develop
            - feature/**
jobs:
    quality_checks:
        if: ${{ startsWith(github.ref_name, 'feature/') && github.event_name == 'push' }}
        runs-on: ubuntu-latest
        steps:
            - name: Perform code quality
              run: echo "Performing quality checks on the code"

    dev_deploy:
        if: ${{ github.ref_name == 'develop' && github.event_name == 'push' }}
        runs-on: ubuntu-latest
        steps:
            - name: Dev deploy
              run: echo "Deploying the code to the development environment"    

    prod_deploy:
        if: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
        runs-on: ubuntu-latest
        steps:
            - name: Prod deploy
              run: echo "Deploying the code to the production environment"    

    success_notify:
        needs: ['quality_checks', 'dev_deploy', 'prod_deploy']
        if: always() && !failure()
        runs-on: ubuntu-latest
        steps:
            - name: Notify Success
              run: echo "Success email sent to the team"  

# if i would leave  :needs: ['quality_checks', 'dev_deploy', 'prod_deploy']
# if success() it may return false because e.g. [true, skip, skip]
# In this example, job3 uses the always() conditional expression so that 
#   it always runs after job1 and job2 have completed, regardless of whether they were successful.

    failure_notify:
        needs: ['quality_checks', 'dev_deploy', 'prod_deploy']
        if: failure()
        runs-on: ubuntu-latest
        steps:
            - name: Notify Failure
              run: echo "Failure email sent to the team"  