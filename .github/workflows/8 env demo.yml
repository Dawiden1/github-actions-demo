name: 8 env demo

on: workflow_dispatch

env:
    APP_ENV: "DEV"
    LEVEL: "WORKFLOW"

jobs:
    env_demo_WORKFLOW_LEVEL:
        runs-on: ubuntu-latest
        steps:
            - name: Connecting to Workflow Level ENV
              run: echo "App is connecting to $APP_ENV"

    env_demo_JOB_LEVEL:
        env:
            APP_ENV: "TEST"
        runs-on: ubuntu-latest
        steps:
            - name: Connecting to Job Level ENV
              run: echo "App is connecting to $APP_ENV"

    env_demo_STEP_LEVEL:
        runs-on: ubuntu-latest
        steps:
            - name: Connecting to Step Level ENV
              env:
                APP_ENV: "PROD"
              run: echo "App is connecting to $APP_ENV"

    env_demo_MIXED_CHECK:
        runs-on: ubuntu-latest
        env:
            LEVEL: "JOB > WORKFLOW"
        steps:
            - name: Connecting to Env with mixed levels
              env:
                LEVEL: "STEP > JOB > WORKFLOW"
              run: echo "App is connecting to $LEVEL"


 