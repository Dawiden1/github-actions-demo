<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Actions Demo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    .container {
      position: relative;
      z-index: 2;
      padding: 40px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
      animation: fadeIn 1.5s ease-in-out;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Floating petals */
    .petal {
      position: absolute;
      top: -10px;
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      opacity: 0.8;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) translateX(50px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Petals -->
  <script>
    const count = 40;
    for (let i = 0; i < count; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = (5 + Math.random() * 10) + 's';
      petal.style.animationDelay = Math.random() * 5 + 's';
      petal.style.width = petal.style.height = (5 + Math.random() * 10) + 'px';
      document.body.appendChild(petal);
    }
  </script>

  <div class="container">
    <h1>GitHub Actions Demo by Dawiden1</h1>
    <div class="footer">Hosted on AWS S3</div>
  </div>

</body>
</html>
